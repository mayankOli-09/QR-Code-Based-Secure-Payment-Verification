<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}QR Secure Payment Verification{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="{% if settings.dark_mode %}dark-mode{% endif %} theme-{{ settings.theme }}">
  <header class="topbar">
    <div class="brand">
      <h1>QR Secure Payment Verification</h1>
      <p>Design a secure QR payment verification mechanism.</p>
    </div>
    <nav class="nav">
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('scan_page') }}">Scan</a>
      <a href="{{ url_for('report_page') }}">Report</a>
      <a href="{{ url_for('settings_page') }}">Settings</a>
    </nav>
  </header>

  {% block content %}{% endblock %}

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
